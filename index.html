<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>碎片笔记 · Fragment Notes</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">✦</div>
                <div class="logo-text">
                    <h1>碎片笔记</h1>
                    <p>Fragment Notes</p>
                </div>
            </div>

            <div class="search-box">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="M21 21l-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索笔记内容、标签...">
            </div>

            <nav class="nav-section">
                <div class="nav-label">浏览方式</div>
                <ul class="nav-list" id="viewNav">
                    <li class="nav-item active" data-view="list">
                        <span class="nav-icon">📋</span>
                        <span class="nav-text">全部笔记</span>
                        <span class="nav-count" id="totalCount">0</span>
                    </li>
                    <li class="nav-item" data-view="timeline">
                        <span class="nav-icon">🕐</span>
                        <span class="nav-text">时间线</span>
                    </li>
                </ul>
            </nav>

            <nav class="nav-section">
                <div class="nav-label">
                    <span>分类</span>
                    <button class="icon-btn" id="addCategoryBtn" title="添加分类">+</button>
                </div>
                <ul class="nav-list" id="categoryList"></ul>
            </nav>

            <div class="sidebar-actions">
                <button class="sidebar-action-btn" id="themeToggleBtn" title="切换主题">
                    <span class="theme-icon-light">🌙</span>
                    <span class="theme-icon-dark" style="display:none">☀️</span>
                    <span class="sidebar-action-text" id="themeToggleText">暗色模式</span>
                </button>
                <button class="sidebar-action-btn" id="exportBtn" title="导出数据">
                    <span>📤</span>
                    <span class="sidebar-action-text">导出</span>
                </button>
                <button class="sidebar-action-btn" id="importBtn" title="导入数据">
                    <span>📥</span>
                    <span class="sidebar-action-text">导入</span>
                </button>
                <input type="file" id="importFileInput" accept=".json" style="display:none">
            </div>

            <div class="sidebar-footer">
                <button class="btn-primary" id="newNoteBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"></path>
                    </svg>
                    新建笔记
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <h2 id="viewTitle">全部笔记</h2>
                    <p id="viewSubtitle">共 0 条笔记</p>
                </div>
                <div class="header-right">
                    <div class="sort-select">
                        <label>排序：</label>
                        <select id="sortSelect">
                            <option value="updated_desc">最近更新</option>
                            <option value="updated_asc">最早更新</option>
                            <option value="created_desc">最近创建</option>
                            <option value="created_asc">最早创建</option>
                            <option value="title_asc">标题 A-Z</option>
                        </select>
                    </div>
                </div>
            </header>

            <section class="content-area" id="contentArea">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📝</div>
                    <h3>还没有笔记</h3>
                    <p>点击左侧「新建笔记」按钮，开始记录你的碎片想法</p>
                </div>

                <div class="list-view" id="listView" style="display: none;"></div>

                <div class="timeline-view" id="timelineView" style="display: none;"></div>
            </section>
        </main>

        <aside class="detail-panel" id="detailPanel">
            <div class="detail-empty" id="detailEmpty">
                <div class="empty-icon-small">👈</div>
                <p>选择左侧一条笔记查看详情</p>
            </div>

            <div class="detail-content" id="detailContent" style="display: none;">
                <div class="detail-actions">
                    <button class="icon-btn" id="editNoteBtn" title="编辑">✏️</button>
                    <button class="icon-btn" id="deleteNoteBtn" title="删除">🗑️</button>
                </div>
                <div class="detail-meta">
                    <span class="detail-category" id="detailCategory"></span>
                    <span class="detail-time" id="detailTime"></span>
                </div>
                <h2 class="detail-title" id="detailTitle"></h2>
                <div class="detail-body" id="detailBody"></div>
                <div class="detail-tags" id="detailTags"></div>
            </div>
        </aside>
    </div>

    <div class="modal" id="noteModal">
        <div class="modal-backdrop" data-close="modal"></div>
        <div class="modal-dialog modal-lg">
            <div class="modal-header">
                <h3 id="modalTitle">新建笔记</h3>
                <button class="icon-btn" data-close="modal">✕</button>
            </div>
            <div class="modal-body">
                <form id="noteForm">
                    <input type="hidden" id="noteId">
                    <div class="form-group">
                        <label>标题</label>
                        <input type="text" id="noteTitle" placeholder="给这条笔记起个名字..." required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>分类</label>
                            <select id="noteCategory" required>
                                <option value="">请选择分类</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>标签（用逗号分隔）</label>
                            <input type="text" id="noteTags" placeholder="例如：重要, 紧急, 待办">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>内容</label>
                        <textarea id="noteContent" rows="10" placeholder="记录你的想法..." required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" data-close="modal">取消</button>
                <button class="btn-primary" id="saveNoteBtn">保存笔记</button>
            </div>
        </div>
    </div>

    <div class="modal" id="categoryModal">
        <div class="modal-backdrop" data-close="modal"></div>
        <div class="modal-dialog">
            <div class="modal-header">
                <h3>新建分类</h3>
                <button class="icon-btn" data-close="modal">✕</button>
            </div>
            <div class="modal-body">
                <form id="categoryForm">
                    <div class="form-group">
                        <label>分类名称</label>
                        <input type="text" id="categoryName" placeholder="例如：项目A、待办事项..." required>
                    </div>
                    <div class="form-group">
                        <label>颜色标记</label>
                        <div class="color-picker" id="colorPicker">
                            <div class="color-option active" data-color="#6366f1" style="background: #6366f1;"></div>
                            <div class="color-option" data-color="#8b5cf6" style="background: #8b5cf6;"></div>
                            <div class="color-option" data-color="#ec4899" style="background: #ec4899;"></div>
                            <div class="color-option" data-color="#ef4444" style="background: #ef4444;"></div>
                            <div class="color-option" data-color="#f97316" style="background: #f97316;"></div>
                            <div class="color-option" data-color="#eab308" style="background: #eab308;"></div>
                            <div class="color-option" data-color="#22c55e" style="background: #22c55e;"></div>
                            <div class="color-option" data-color="#14b8a6" style="background: #14b8a6;"></div>
                            <div class="color-option" data-color="#3b82f6" style="background: #3b82f6;"></div>
                            <div class="color-option" data-color="#64748b" style="background: #64748b;"></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" data-close="modal">取消</button>
                <button class="btn-primary" id="saveCategoryBtn">保存分类</button>
            </div>
        </div>
    </div>

    <div class="modal" id="confirmModal">
        <div class="modal-backdrop" data-close="confirm"></div>
        <div class="modal-dialog">
            <div class="modal-body" style="padding:28px 24px;">
                <div class="confirm-icon" id="confirmIcon">⚠️</div>
                <h3 class="confirm-title" id="confirmTitle">确认操作</h3>
                <p class="confirm-message" id="confirmMessage"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="confirmCancelBtn">取消</button>
                <button class="btn-primary btn-danger" id="confirmOkBtn">确认</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/categories.js"></script>
    <script src="assets/js/search.js"></script>
    <script src="assets/js/notes.js"></script>
    <script src="assets/js/timeline.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
